name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install server deps
        run: npm install
        working-directory: deva-guru-app/server

      # Inject secrets as env vars at deploy time — never stored in repo
      - name: Deploy to your platform
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          DYNAMODB_TABLE: astrologist-customers
          PORT: 3001
        run: |
          echo "Deploy your server here"
          # e.g. for Railway: railway up
          # e.g. for Fly.io: fly deploy
